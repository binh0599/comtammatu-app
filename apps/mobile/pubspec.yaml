name: comtammatu
description: "Cơm Tấm Má Tư - Ứng dụng khách hàng thân thiết"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  supabase_flutter: ^2.8.3

  # Offline Storage
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16

  # QR
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

  # Maps
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # Push Notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Monitoring
  sentry_flutter: ^8.12.0

  # Analytics
  posthog_flutter: ^4.5.0

  # Splash & App Icon
  flutter_native_splash: ^2.4.4

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1
  mocktail: ^1.0.4
  patrol: ^3.13.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  generate: true  # Enable l10n

  assets:
    - assets/icon/
