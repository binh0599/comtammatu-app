flutter_native_splash:
  # Cơm Tấm Má Tư - Native Splash Screen Config
  color: "#FAF8F5"
  color_dark: "#1C1917"

  # App logo as splash image
  image: assets/icon/app_icon.png

  # Android 12+ splash
  android_12:
    color: "#FAF8F5"
    color_dark: "#1C1917"
    image: assets/icon/app_icon.png
    icon_background_color: "#FAF8F5"
    icon_background_color_dark: "#1C1917"

  # Platform settings
  android: true
  ios: true
  web: false

  # Fullscreen
  fullscreen: true
